<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#g)"/>
  <!-- Radar rings -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="64" cy="64" r="32" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="64" cy="64" r="16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Crosshair -->
  <line x1="64" y1="16" x2="64" y2="112" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="16" y1="64" x2="112" y2="64" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Signal dot -->
  <circle cx="64" cy="64" r="6" fill="white" opacity="0.9"/>
  <circle cx="64" cy="64" r="3" fill="white"/>
  <!-- Orbiting ring -->
  <circle cx="64" cy="64" r="40" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"
    stroke-dasharray="4 8" />
  <!-- Recursion arcs -->
  <path d="M64 24 A40 40 0 0 1 104 64" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <path d="M64 24 A40 40 0 0 0 24 64" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <path d="M24 64 A40 40 0 0 0 64 104" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <path d="M104 64 A40 40 0 0 0 64 104" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
</svg>
